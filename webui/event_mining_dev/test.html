<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" charset="utf-8" />
    <style>
        .shop-card {
            float: left;
            width: 187px;
            height: 216px;
            background-color: #7f7f7fff;
            border: 10px solid #ffffffff;
        }

        .shop-card-stock-amount-area {
            width: auto;
            height: 33px;
        }

        .shop-card-stock-amount-text {
            font-size: 1.6em;
            width: 157px;
            height: 30px;
            vertical-align: middle;
            margin-left: auto;
            margin-right: auto;
            text-align: center;
            color: #000000ff;
        }

        .shop-card-thumbnail-area {
            position: relative;
            width: 128px;
            height: 128px;
            margin-left: auto;
            margin-right: auto;
        }

        .shop-card-thumbnail-img {
            width: 128px;
            height: 128px;
            filter: brightness(0.5);
        }

        .shop-card-thumbnail-content-amount {
            position: absolute;
            left: 50%;
            bottom: 0%;
            font-size: 1.6em;
            transform: translate(-50%, 0%);
            color: #7f7f7fff;
            text-shadow:
                -1px -1px 0 #262626ff,
                -1px 1px 0 #262626ff,
                1px -1px 0 #262626ff,
                1px 1px 0 #262626ff;
        }

        .shop-card-thumbnail-price-separation-area {
            width: auto;
            height: 11px;
        }

        .shop-card-price-area {
            width: 157px;
            height: 30px;
            background-color: #25252aff;
            overflow: hidden;
            margin-left: auto;
            margin-right: auto;
        }

        .shop-card-price-icon-area {
            float: left;
            width: 30px;
            height: 30px;
            margin-left: 5%;
        }

        .shop-card-price-icon-img {
            width: 30px;
            height: 30px;
            filter: brightness(0.5);
        }

        .shop-card-price-text {
            float: right;
            font-size: 1.6em;
            height: 30px;
            vertical-align: text-bottom;
            text-align: right;
            color: #7f7f7fff;
            margin-right: 5%;
        }
    </style>
</head>
