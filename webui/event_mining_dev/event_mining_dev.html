<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" charset="utf-8" />
    <style>
        .form-row {
            overflow: hidden;
        }

        .form-option {
            border: 1cqmin solid #00000000;
            float: left;
        }

        .form-selected-option {
            border: 1cqmin solid #00ff00ff;
            float: left;
        }

        .form-image-option {
            max-width: 31vw;
            max-height: 31vh;
        }

        .form-button-option {
            width: 31vw;
            text-align: center;
        }

        /* common items first */
        .content-thumbnail {
            width: 128px;
            height: 128px;
        }

        .content-thumbnail-image {
            width: 100%;
            height: 100%;
        }

        .content-thumbnail-image-content-amount {
            position: absolute;
            left: 50%;
            bottom: 0%;
            font-size: 1.6em;
            transform: translate(-50%, 0%);
            color: #7f7f7fff;
            text-shadow:
                -1px -1px 0 #262626ff,
                -1px 1px 0 #262626ff,
                1px -1px 0 #262626ff,
                1px 1px 0 #262626ff;
        }

        /* trade item */
        .trade-item {
            float: left;
            width: 187px;
            height: 216px;
            background-color: #7f7f7fff;
        }

        .trade-item-unavailable {
            filter: brightness(0.5);
        }

        .trade-item-stock-amount-area {
            width: auto;
            height: 33px;
        }

        .trade-item-stock-amount-text {
            font-size: 1.6em;
            width: 157px;
            height: 30px;
            vertical-align: middle;
            margin-left: auto;
            margin-right: auto;
            text-align: center;
            color: #000000ff;
        }

        .trade-item-thumbnail-area {
            position: relative;
            width: 128px;
            height: 128px;
            margin-left: auto;
            margin-right: auto;
        }

        .trade-item-thumbnail-price-separation-area {
            width: auto;
            height: 11px;
        }

        .trade-item-price-area {
            width: 157px;
            height: 30px;
            background-color: #25252aff;
            overflow: hidden;
            margin-left: auto;
            margin-right: auto;
        }

        .trade-item-price-icon-area {
            float: left;
            width: 30px;
            height: 30px;
            margin-left: 5%;
        }

        .trade-item-price-icon-img {
            width: 30px;
            height: 30px;
        }

        .trade-item-price-text {
            float: right;
            font-size: 1.6em;
            height: 30px;
            vertical-align: text-bottom;
            text-align: right;
            color: #7f7f7fff;
            margin-right: 5%;
        }
    </style>
</head>

<body>
    {{ .body | noescape }}
</body>

</html>

<script>
    function set_form_data(obj, inputId, value) {
        selected_options = document.getElementsByClassName("form-selected-option")
        while (selected_options.length > 0)
            selected_options[0].classList.replace("form-selected-option", "form-option")
        if (obj.classList.contains("form-option")) {
            obj.classList.replace("form-option", "form-selected-option")
        } else {
            selected_options = obj.getElementsByClassName("form-option")
            while (selected_options.length > 0)
                selected_options[0].classList.replace("form-option", "form-selected-option")
        }
        document.getElementById(inputId).value = value
        document.getElementsByTagName("input")[0].focus({
            preventScroll: true
        })
    }
</script>
</html>
